<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO básico -->
    <title>VetSystem — Gestión Veterinaria</title>
    <meta name="description" content="Sistema integral de gestión veterinaria: pacientes, citas, historias clínicas y notificaciones." />
    <meta name="theme-color" content="#0B7285" />

    <!-- La app es privada; no tiene sentido que los bots la indexen -->
    <meta name="robots" content="noindex, nofollow" />

    <base href="/" />

    <!-- CSS de la app — se carga en paralelo; la splash screen no lo necesita -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="VetSystem.Frontend.styles.css" rel="stylesheet" />

    <!-- Estilos críticos inline para la splash screen
         Se resuelven antes de que llegue app.css, así el usuario nunca
         ve fondo blanco ni círculo sin estilos                          -->
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: #F0F4F8;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #1A2332;
        }

        /* ── Splash screen ── */
        #app-splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: #F0F4F8;
            z-index: 9999;
        }

        .splash-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .splash-icon {
            width: 56px;
            height: 56px;
            background: #0B7285;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 16px rgba(11,114,133,.25);
        }

        .splash-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: #0B7285;
            letter-spacing: -0.5px;
        }

        .splash-tagline {
            font-size: 0.875rem;
            color: #64748B;
            letter-spacing: 0.01em;
        }

        /* Spinner de tres puntos rebotando — ligero y sin SVG externo */
        .splash-dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .splash-dots span {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #0B7285;
            animation: splash-bounce 1.1s ease-in-out infinite;
        }

        .splash-dots span:nth-child(1) { animation-delay: 0s;    opacity: .4; }
        .splash-dots span:nth-child(2) { animation-delay: .18s; }
        .splash-dots span:nth-child(3) { animation-delay: .36s; opacity: .4; }

        @keyframes splash-bounce {
            0%, 80%, 100% { transform: scale(0.7); opacity: .35; }
            40%            { transform: scale(1);   opacity: 1;   }
        }

        /* Error UI de Blazor */
        #blazor-error-ui {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 12px 20px;
            background: #fee2e2;
            color: #991b1b;
            border-top: 1px solid #fca5a5;
            font-size: .875rem;
            z-index: 10000;
        }

        #blazor-error-ui .reload { color: #991b1b; font-weight: 600; margin: 0 6px; }
        #blazor-error-ui .dismiss { float: right; cursor: pointer; font-weight: 700; }
    </style>
</head>

<body>

    <!-- Splash screen visible mientras Blazor WASM descarga el runtime -->
    <div id="app-splash">
        <div class="splash-brand">
            <div class="splash-icon">🐾</div>
            <span class="splash-name">VetSystem</span>
        </div>
        <div class="splash-tagline">Gestión veterinaria integral</div>
        <div class="splash-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Blazor monta aquí y reemplaza el contenido del div#app -->
    <div id="app"></div>

    <div id="blazor-error-ui">
        Ocurrió un error inesperado.
        <a href="." class="reload">Recargar</a>
        <span class="dismiss">✕</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <!-- Oculta el splash en cuanto Blazor termina de montar la app -->
    <script>
        (function () {
            // Blazor dispara este evento cuando el primer render termina
            document.addEventListener('DOMContentLoaded', function () {
                var observer = new MutationObserver(function () {
                    var app = document.getElementById('app');
                    if (app && app.children.length > 0) {
                        var splash = document.getElementById('app-splash');
                        if (splash) {
                            splash.style.transition = 'opacity .25s ease';
                            splash.style.opacity = '0';
                            setTimeout(function () { splash.remove(); }, 280);
                        }
                        observer.disconnect();
                    }
                });
                observer.observe(document.getElementById('app') || document.body, { childList: true, subtree: true });
            });
        })();
    </script>

</body>

</html>
