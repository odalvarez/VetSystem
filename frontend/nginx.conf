# Redirige todo el tráfico HTTP a HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Certificado Origin de Cloudflare — válido hasta 2041
    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Cabeceras de seguridad — protegen contra clickjacking, MIME sniffing y XSS básico
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # CSP conservadora: solo recursos del mismo origen; ajustar si se usan CDNs en el futuro
    add_header Content-Security-Policy
        "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; connect-src 'self'; img-src 'self' data:;"
        always;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión para que los archivos .wasm y .dll no tarden tanto en cargar
    gzip on;
    gzip_types application/wasm application/octet-stream text/css application/javascript;
    gzip_min_length 1024;

    # Extiende los MIME types globales; nginx fusiona este bloque con el del http
    types {
        application/wasm  wasm;
        text/html         html htm;
        text/css          css;
        application/javascript js;
    }

    # ── Proxy inverso hacia los microservicios ─────────────────────────────────────
    # Todas las llamadas van al mismo origen para que la cookie httpOnly se envíe
    # automáticamente sin configuración adicional en el cliente.

    location /api/auth {
        proxy_pass         http://vetsystem-auth:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/patients {
        proxy_pass         http://vetsystem-patients:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/species {
        proxy_pass         http://vetsystem-patients:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/appointments {
        proxy_pass         http://vetsystem-appointments:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # La clave interna se añade aquí; el navegador nunca la ve ni la envía
    location /api/notifications {
        proxy_pass         http://vetsystem-notifications:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Internal-Key    "cdbfb5e7f409657df504c7ceb0e92d85fd300f6469d2b13cb01fda75816f5430";
    }

    location / {
        # SPA routing: todas las rutas que no existen como archivo se redirigen a index.html
        # Sin esto, recargar la página en /vet-dashboard daría 404
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para los assets con hash en el nombre (Blazor los genera con fingerprint)
    location ~* \.(wasm|dll|dat)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html nunca se cachea para que el navegador siempre descargue la versión más reciente
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
