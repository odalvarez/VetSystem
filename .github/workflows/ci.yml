name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore & build — auth-service
        run: dotnet build services/auth-service/AuthService.sln --configuration Release

      - name: Test — auth-service
        run: dotnet test services/auth-service/AuthService.sln --configuration Release --no-build --verbosity normal

      - name: Restore & build — patients-service
        run: dotnet build services/patients-service/PatientsService.sln --configuration Release

      - name: Test — patients-service
        run: dotnet test services/patients-service/PatientsService.sln --configuration Release --no-build --verbosity normal

      - name: Restore & build — appointments-service
        run: dotnet build services/appointments-service/AppointmentsService.sln --configuration Release

      - name: Test — appointments-service
        run: dotnet test services/appointments-service/AppointmentsService.sln --configuration Release --no-build --verbosity normal

      - name: Restore & build — notifications-service
        run: dotnet build services/notifications-service/NotificationsService.sln --configuration Release

      - name: Test — notifications-service
        run: dotnet test services/notifications-service/NotificationsService.sln --configuration Release --no-build --verbosity normal
